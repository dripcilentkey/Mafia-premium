<!DOCTYPE html>
<html lang="en">
<head>

<title>MAFIA PREMIUM</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
scroll-behavior:smooth;
}

body{
background:#0d0d0d;
color:white;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(to bottom,#000,#1a0000);
}

h1{
font-size:55px;
color:red;
text-shadow:0 0 20px red;
}

p{
margin-top:15px;
font-size:20px;
color:#ddd;
}

.btn{
margin-top:30px;
padding:15px 35px;
background:red;
color:white;
text-decoration:none;
border-radius:50px;
font-size:18px;
transition:.3s;
}

.btn:hover{
background:white;
color:red;
}

section{
padding:80px 20px;
text-align:center;
}

h2{
color:red;
margin-bottom:30px;
font-size:35px;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:#1a1a1a;
padding:25px;
width:250px;
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px red;
}

.price{
font-size:30px;
color:red;
margin:15px 0;
}

footer{
padding:20px;
text-align:center;
background:black;
}
</style>

</head>

<body>

<header>

<a href="#plans" class="btn">BUY NOW</a>

<div class="cards">

<div class="card">
<h3>⚡ Instant Delivery</h3>
</div>

<div class="card">
<h3>🔒 Secure Payment</h3>
</div>

<div class="card">
<h3>💬 24/7 Support</h3>
</div>

</div>

</section>

<section id="plans">

<h2>OUR PLANS</h2>

<div class="cards">

<div class="card">
<h3>Basic</h3>
<div class="price">₹99</div>
<a class="btn" href="https://t.me/MAFIAXPANEL04">Buy</a>
</div>

<div class="card">
<h3>Premium</h3>
<div class="price">₹199</div>
<a class="btn" href="https://t.me/MAFIAXPANEL04">Buy</a>
</div>

</div>

</div>

</section>

<section>

<h2>CONTACT</h2>

<p>📞 WhatsApp : 7339488009</p>

<p>📩 Telegram : @MAFIAXPANEL04</p>

</section>

<footer>

© 2026 MAFIA PREMIUM

</footer>

<script>

const cards=document.querySelectorAll(".card");

window.addEventListener("scroll",()=>{

cards.forEach(card=>{

const top=card.getBoundingClientRect().top;

if(top<window.innerHeight-100){

card.style.opacity="1";

card.style.transform="translateY(0px)";

}

});

});

cards.forEach(card=>{

card.style.opacity="0";

card.style.transform="translateY(60px)";

card.style.transition="0.8s";

});

</script>

</body>
</html>
